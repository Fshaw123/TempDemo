<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌹 鲜花饼采购系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #c2185b;
  --rose-light: #f48fb1;
  --rose-pale: #fce4ec;
  --rose-deep: #880e4f;
  --rose-mid: #e91e63;
  --cream: #fff8f5;
  --warm-white: #fffaf8;
  --text-dark: #2a1a1f;
  --text-mid: #6d4c5a;
  --text-light: #b07090;
  --border: #f0c8d8;
  --gold: #c9984a;
  --shadow: rgba(194, 24, 91, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  min-height: 100vh;
}

/* ── background pattern ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(194,24,91,0.05) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(233,30,99,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.page { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 40px 20px 80px; }

/* ── header ── */
header { text-align: center; margin-bottom: 48px; }
header .eyebrow {
  font-family: 'Noto Serif SC', serif;
  font-size: 11px;
  letter-spacing: 6px;
  color: var(--rose-light);
  text-transform: uppercase;
  margin-bottom: 12px;
}
header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--rose-deep);
  line-height: 1.2;
  margin-bottom: 8px;
}
header p {
  font-size: 13px;
  color: var(--text-light);
  letter-spacing: 1px;
}
.divider {
  display: flex; align-items: center; gap: 16px;
  margin: 20px auto; width: 200px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--rose-light);
}
.divider span { color: var(--rose-light); font-size: 14px; }

/* ── panels ── */
.panel {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 24px;
  box-shadow: 0 4px 24px var(--shadow);
}
.panel-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--rose-deep);
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 10px;
}
.panel-title .icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--rose-pale);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

/* ── product catalog ── */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.product-card {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  background: white;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.product-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--rose-pale);
  transition: background 0.2s;
}
.product-card.has-qty::before { background: var(--rose-mid); }
.product-card:hover { border-color: var(--rose-light); box-shadow: 0 2px 12px var(--shadow); }

.product-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
.product-name { font-size: 13px; font-weight: 500; color: var(--text-dark); line-height: 1.4; flex: 1; }
.product-tag {
  font-size: 10px; padding: 2px 7px; border-radius: 99px;
  white-space: nowrap; flex-shrink: 0;
}
.tag-top1 { background: #fce4ec; color: #c2185b; }
.tag-top2 { background: #f3e5f5; color: #7b1fa2; }
.tag-cloud { background: #e3f2fd; color: #1565c0; }
.tag-limit { background: #fff3e0; color: #e65100; }
.tag-new { background: #e8f5e9; color: #2e7d32; }

.product-desc { font-size: 11px; color: var(--text-light); margin-bottom: 10px; line-height: 1.5; }

.product-bottom { display: flex; align-items: center; justify-content: space-between; }
.product-price { font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--rose); font-weight: 600; }
.product-price span { font-size: 11px; font-weight: 400; color: var(--text-light); }

.qty-ctrl { display: flex; align-items: center; gap: 8px; }
.qty-btn {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--cream);
  cursor: pointer;
  font-size: 16px; line-height: 1;
  color: var(--rose); display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-family: monospace;
}
.qty-btn:hover { background: var(--rose-pale); border-color: var(--rose-light); }
.qty-btn:active { transform: scale(0.92); }
.qty-num {
  min-width: 24px; text-align: center;
  font-size: 14px; font-weight: 500; color: var(--text-dark);
}

/* ── box section ── */
.boxes-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.add-box-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 18px; border-radius: 99px;
  border: 1px dashed var(--rose-light);
  background: transparent; cursor: pointer;
  font-size: 13px; color: var(--rose);
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
}
.add-box-btn:hover { background: var(--rose-pale); border-style: solid; }

.box-card {
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 16px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.box-card:hover { box-shadow: 0 4px 16px var(--shadow); }
.box-header-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.box-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.box-name-input {
  flex: 1; border: none; background: transparent;
  font-family: 'Noto Serif SC', serif;
  font-size: 15px; font-weight: 600; color: var(--rose-deep);
  outline: none;
}
.box-name-input::placeholder { color: var(--text-light); font-weight: 400; }
.box-meta { font-size: 12px; color: var(--text-light); white-space: nowrap; }
.box-del-btn {
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; cursor: pointer;
  font-size: 11px; color: var(--text-light);
  transition: all 0.15s;
}
.box-del-btn:hover { border-color: #f44336; color: #f44336; background: #ffebee; }

.box-slots {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0;
}
.slot {
  aspect-ratio: 1;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 8px 4px;
  position: relative; cursor: pointer;
  transition: background 0.15s;
  min-height: 70px;
}
.slot:nth-child(5n) { border-right: none; }
.slot:nth-child(n+6) { /* last row */ }
.slot:nth-last-child(-n+5) { border-bottom: none; }
.slot.empty { background: white; }
.slot.empty:hover { background: var(--rose-pale); }
.slot.filled { background: var(--warm-white); }
.slot.filled:hover { background: var(--rose-pale); }

.slot-plus { font-size: 20px; color: var(--border); line-height: 1; }
.slot-hint { font-size: 9px; color: var(--text-light); margin-top: 3px; }
.slot-content { text-align: center; }
.slot-name { font-size: 10px; font-weight: 500; color: var(--text-dark); line-height: 1.3; }
.slot-price { font-size: 10px; color: var(--rose); margin-top: 3px; }
.slot-x {
  position: absolute; top: 3px; right: 4px;
  font-size: 11px; color: var(--text-light);
  line-height: 1; cursor: pointer;
  opacity: 0; transition: opacity 0.15s;
}
.slot.filled:hover .slot-x { opacity: 1; }
.slot-x:hover { color: #f44336; }

/* dropdown picker */
.slot-wrapper { position: relative; }
.slot-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 50%; transform: translateX(-50%);
  z-index: 100;
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  width: 220px;
  max-height: 280px;
  overflow-y: auto;
  padding: 6px;
}
.slot-dropdown.open { display: block; }
.slot-dropdown::-webkit-scrollbar { width: 4px; }
.slot-dropdown::-webkit-scrollbar-track { background: transparent; }
.slot-dropdown::-webkit-scrollbar-thumb { background: var(--rose-light); border-radius: 2px; }

.dd-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-radius: 8px; cursor: pointer;
  font-size: 12px; color: var(--text-dark);
  transition: background 0.1s;
}
.dd-item:hover { background: var(--rose-pale); }
.dd-name { flex: 1; line-height: 1.3; }
.dd-price { font-size: 12px; color: var(--rose); font-weight: 500; flex-shrink: 0; margin-left: 8px; }

/* ── box footer ── */
.box-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px;
  background: var(--cream);
  border-top: 1px solid var(--border);
}
.box-progress-wrap { display: flex; align-items: center; gap: 10px; flex: 1; }
.progress-bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; max-width: 120px; }
.progress-bar-fill { height: 100%; border-radius: 2px; background: var(--rose); transition: width 0.3s; }
.box-progress-label { font-size: 11px; color: var(--text-light); white-space: nowrap; }
.box-subtotal { font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--rose-deep); font-weight: 600; }

/* ── summary ── */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.stat-label { font-size: 11px; color: var(--text-light); margin-bottom: 6px; letter-spacing: 0.5px; }
.stat-value { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700; color: var(--rose-deep); }
.stat-unit { font-size: 12px; color: var(--text-light); font-weight: 400; }

.total-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--rose-deep);
  border-radius: 12px;
  padding: 18px 24px;
  color: white;
}
.total-label { font-size: 14px; opacity: 0.85; letter-spacing: 1px; }
.total-amount { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 700; }

/* ── box color dots ── */
.dot-colors = ['#e91e63','#9c27b0','#2196f3','#ff5722','#009688','#ff9800','#3f51b5','#4caf50'];

/* ── empty state ── */
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--text-light); font-size: 13px;
}
.empty-state .big { font-size: 32px; margin-bottom: 8px; }

/* ── animations ── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.box-card { animation: fadeIn 0.25s ease; }

/* ── notice ── */
.notice {
  font-size: 11px; color: var(--text-light);
  background: var(--rose-pale);
  border-radius: 8px; padding: 10px 14px;
  margin-top: 16px; line-height: 1.7;
}
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="eyebrow">新鲜现烤 · 匠心手作</div>
    <h1>🌹 鲜花饼采购系统</h1>
    <p>选择商品 · 配置礼盒 · 自动计算</p>
    <div class="divider"><span>❀</span></div>
  </header>

  <!-- 商品选择 -->
  <div class="panel">
    <div class="panel-title"><div class="icon">①</div>选择采购商品</div>
    <div class="products-grid" id="productGrid"></div>
    <div class="notice">
      💡 点击 <strong>＋</strong> 增加数量，商品会自动分配到礼盒空位；点击 <strong>－</strong> 减少数量，会从最后一个礼盒中移除。也可以直接在礼盒格子中点击选择商品。
    </div>
  </div>

  <!-- 礼盒配置 -->
  <div class="panel">
    <div class="boxes-header">
      <div class="panel-title" style="margin-bottom:0"><div class="icon">②</div>礼盒配置 <span style="font-size:12px;color:var(--text-light);font-weight:400;margin-left:4px">每盒10枚，可混搭</span></div>
      <button class="add-box-btn" onclick="addBox()">＋ 新增礼盒</button>
    </div>
    <div id="boxesArea"></div>
  </div>

  <!-- 采购汇总 -->
  <div class="panel">
    <div class="panel-title"><div class="icon">③</div>采购汇总</div>
    <div class="summary-grid" id="statsGrid"></div>
    <div class="total-row">
      <span class="total-label">合计总价</span>
      <span class="total-amount" id="grandTotal">¥ 0.0</span>
    </div>
  </div>

</div>

<script>
const PRODUCTS = [
  { id:'P01', name:'手作经典玫瑰花饼', desc:'热销排行首位鲜花饼 经典之致', tag:'销量TOP1', tagClass:'tag-top1', price:4.0 },
  { id:'P02', name:'云腿小饼', desc:'宣威老火腿 咸香酥润', tag:'云南名点', tagClass:'tag-cloud', price:3.5 },
  { id:'P03', name:'招牌妙香玫瑰花饼', desc:'黄油制饼 创新手作', tag:'销量TOP2', tagClass:'tag-top2', price:5.0 },
  { id:'P04', name:'妙香黑金玫瑰花饼', desc:'门店限定 天然食材', tag:'门店限定', tagClass:'tag-limit', price:6.5 },
  { id:'P05', name:'白玉茉莉鲜花饼', desc:'优选云南元江茉莉花 清新口感', tag:'', tagClass:'', price:4.0 },
  { id:'P06', name:'鎏金桂花鲜花饼', desc:'当季手打金桂 绵密酥口', tag:'', tagClass:'', price:4.0 },
  { id:'P07', name:'抹茶玫瑰鲜花饼', desc:'创新日式抹茶粉 独特口感 清爽不腻', tag:'', tagClass:'', price:4.0 },
  { id:'P08', name:'刺梨玫瑰鲜花饼', desc:'维生素C之王水果融合 臻选贵州刺梨', tag:'新品', tagClass:'tag-new', price:4.0 },
  { id:'P09', name:'茅香玫瑰鲜花饼', desc:'云南高原苦荞 重瓣红玫瑰 外酥里润', tag:'', tagClass:'', price:4.0 },
  { id:'P10', name:'木糖醇玫瑰鲜花饼', desc:'0蔗糖添加 控糖人群福音', tag:'', tagClass:'', price:4.0 },
  { id:'P11', name:'杏仁玫瑰鲜花饼', desc:'36层酥皮 饱满杏仁片包裹 大颗松子入馅', tag:'', tagClass:'', price:4.5 },
  { id:'P12', name:'雪媚娘玫瑰鲜花饼', desc:'Q弹雪媚娘包裹高原重瓣玫瑰花 唇齿留香', tag:'', tagClass:'', price:5.0 },
  { id:'P13', name:'雪媚娘玫瑰蛋黄酥', desc:'咸香大颗蛋黄 高原重瓣玫瑰入馅 甜咸可口', tag:'', tagClass:'', price:5.5 },
  { id:'P14', name:'云腿玫瑰鲜花饼', desc:'云南宣威高品质老火腿 融入饱满玫瑰花香', tag:'新品', tagClass:'tag-new', price:5.5 },
];

const BOX_COLORS = ['#e91e63','#9c27b0','#2196f3','#ff5722','#009688','#ff9800','#3f51b5','#4caf50'];

let boxes = [];
let boxCounter = 0;
const pMap = {};
PRODUCTS.forEach(p => pMap[p.id] = p);

function productById(id) { return pMap[id]; }

function countQty(pid) {
  let n = 0;
  boxes.forEach(b => b.slots.forEach(s => { if(s===pid) n++; }));
  return n;
}

function addBox() {
  boxCounter++;
  boxes.push({ id:'box'+boxCounter, name:'礼盒'+boxCounter, slots: Array(10).fill(null), color: BOX_COLORS[(boxCounter-1)%BOX_COLORS.length] });
  render();
}

function removeBox(bid) {
  boxes = boxes.filter(b=>b.id!==bid);
  render();
}

function quickAdd(pid, delta) {
  if(delta>0) {
    let placed=false;
    for(let b of boxes) {
      const i=b.slots.indexOf(null);
      if(i!==-1){b.slots[i]=pid;placed=true;break;}
    }
    if(!placed){
      const nb={id:'box'+(++boxCounter),name:'礼盒'+boxCounter,slots:Array(10).fill(null),color:BOX_COLORS[(boxCounter-1)%BOX_COLORS.length]};
      nb.slots[0]=pid; boxes.push(nb);
    }
  } else {
    for(let i=boxes.length-1;i>=0;i--){
      const b=boxes[i];
      for(let j=b.slots.length-1;j>=0;j--){
        if(b.slots[j]===pid){b.slots[j]=null;render();return;}
      }
    }
  }
  render();
}

function fillSlot(bid, idx, pid) {
  const b=boxes.find(x=>x.id===bid);
  if(b) b.slots[idx]=pid;
  closeAllDropdowns();
  render();
}

function clearSlot(bid, idx, e) {
  e.stopPropagation();
  const b=boxes.find(x=>x.id===bid);
  if(b) b.slots[idx]=null;
  render();
}

function closeAllDropdowns() {
  document.querySelectorAll('.slot-dropdown.open').forEach(d=>d.classList.remove('open'));
}

function toggleDropdown(bid, idx, e) {
  e.stopPropagation();
  const key=`dd_${bid}_${idx}`;
  const el=document.getElementById(key);
  if(!el) return;
  const wasOpen=el.classList.contains('open');
  closeAllDropdowns();
  if(!wasOpen) {
    el.classList.add('open');
    // adjust position if near right edge
    const rect=el.getBoundingClientRect();
    if(rect.right>window.innerWidth-10){ el.style.left='auto'; el.style.right='0'; el.style.transform='none'; }
    else { el.style.left=''; el.style.right=''; el.style.transform=''; }
  }
}

document.addEventListener('click', closeAllDropdowns);

/* ─── render ─── */
function renderProducts() {
  const grid=document.getElementById('productGrid');
  grid.innerHTML = PRODUCTS.map(p=>{
    const qty=countQty(p.id);
    return `<div class="product-card ${qty>0?'has-qty':''}">
      <div class="product-top">
        <div class="product-name">${p.name}</div>
        ${p.tag?`<span class="product-tag ${p.tagClass}">${p.tag}</span>`:''}
      </div>
      <div class="product-desc">${p.desc}</div>
      <div class="product-bottom">
        <div class="product-price">${p.price}<span> 元/枚</span></div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="quickAdd('${p.id}',-1)">−</button>
          <span class="qty-num" id="qty_${p.id}">${qty}</span>
          <button class="qty-btn" onclick="quickAdd('${p.id}',1)">＋</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderBoxes() {
  const area=document.getElementById('boxesArea');
  if(boxes.length===0){
    area.innerHTML=`<div class="empty-state"><div class="big">🎁</div>还没有礼盒，点击上方"新增礼盒"开始配置</div>`;
    return;
  }
  area.innerHTML = boxes.map(box=>{
    const filled=box.slots.filter(Boolean).length;
    const total=box.slots.reduce((s,id)=>s+(id?pMap[id].price:0),0);
    const pct=Math.round(filled/10*100);

    const ddItems=PRODUCTS.map(p=>
      `<div class="dd-item" onclick="fillSlot('${box.id}',__IDX__,'${p.id}');event.stopPropagation()">
        <span class="dd-name">${p.name}</span>
        <span class="dd-price">${p.price}元</span>
      </div>`
    ).join('');

    const slotsHtml=box.slots.map((sid,idx)=>{
      if(sid){
        const p=pMap[sid];
        const short=p.name.replace(/鲜花饼|花饼/g,'').slice(0,5);
        return `<div class="slot filled" onclick="toggleDropdown('${box.id}',${idx},event)">
          <span class="slot-x" onclick="clearSlot('${box.id}',${idx},event)">✕</span>
          <div class="slot-content">
            <div class="slot-name">${short}</div>
            <div class="slot-price">${p.price}元</div>
          </div>
          <div class="slot-dropdown" id="dd_${box.id}_${idx}" onclick="event.stopPropagation()">
            ${ddItems.replace(/__IDX__/g, idx)}
          </div>
        </div>`;
      } else {
        return `<div class="slot empty" onclick="toggleDropdown('${box.id}',${idx},event)">
          <div class="slot-plus">＋</div>
          <div class="slot-hint">点击选品</div>
          <div class="slot-dropdown" id="dd_${box.id}_${idx}" onclick="event.stopPropagation()">
            ${ddItems.replace(/__IDX__/g, idx)}
          </div>
        </div>`;
      }
    }).join('');

    const warn = filled<10
      ? `<span class="box-progress-label" style="color:#ff9800">还差${10-filled}枚满盒</span>`
      : `<span class="box-progress-label" style="color:#4caf50">✓ 已满盒</span>`;

    return `<div class="box-card">
      <div class="box-header-bar">
        <div class="box-dot" style="background:${box.color}"></div>
        <input class="box-name-input" value="${box.name}" placeholder="为礼盒命名…"
          onchange="boxes.find(b=>b.id==='${box.id}').name=this.value; renderSummary()">
        <span class="box-meta">${filled}/10 枚 · ¥${total.toFixed(1)}</span>
        <button class="box-del-btn" onclick="removeBox('${box.id}')">删除</button>
      </div>
      <div class="box-slots">${slotsHtml}</div>
      <div class="box-footer">
        <div class="box-progress-wrap">
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:${box.color}"></div></div>
          ${warn}
        </div>
        <div class="box-subtotal">¥ ${total.toFixed(1)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderSummary() {
  const totalPcs = boxes.reduce((s,b)=>s+b.slots.filter(Boolean).length,0);
  const totalAmt = boxes.reduce((s,b)=>s+b.slots.reduce((a,id)=>a+(id?pMap[id].price:0),0),0);
  const kinds = new Set(boxes.flatMap(b=>b.slots.filter(Boolean))).size;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">礼盒数量</div><div class="stat-value">${boxes.length}<span class="stat-unit"> 盒</span></div></div>
    <div class="stat-card"><div class="stat-label">商品种类</div><div class="stat-value">${kinds}<span class="stat-unit"> 种</span></div></div>
    <div class="stat-card"><div class="stat-label">采购总枚数</div><div class="stat-value">${totalPcs}<span class="stat-unit"> 枚</span></div></div>
    <div class="stat-card"><div class="stat-label">均价</div><div class="stat-value">${totalPcs?'¥'+(totalAmt/totalPcs).toFixed(1):'—'}</div></div>
  `;
  document.getElementById('grandTotal').textContent = '¥ ' + totalAmt.toFixed(1);
}

function render() {
  renderProducts();
  renderBoxes();
  renderSummary();
}

render();
</script>
</body>
</html>
